version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # Major bumps of pinned core deps are reviewed manually, not
      # auto-proposed — they carry breaking changes (TypeScript) or are
      # intentionally aligned to a supported version (zod 3 API; @types/node
      # tracks the supported Node line).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
